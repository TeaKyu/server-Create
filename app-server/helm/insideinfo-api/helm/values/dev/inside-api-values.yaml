replicaCount: 1
image:
  repository: gitlab.insideinfo.co.kr:5005/ax-2/insideinfo-api/insideinfo-api
  pullPolicy: Always
  tag: "dev-20260416-1115"
fullnameOverride: insideinfo-api-dev
imagePullSecrets:
- name: gitlab-registry-secret
serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""
podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
httproute:
  enabled: true
  gatewayName: eg
  gatewayNamespace: default
  hostnames:
  - dev.insideinfo.api
resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "2Gi"
    cpu: "2000m"
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80
volumes:
- name: secret-config
  secret:
    secretName: insideinfo-api-dev-config
- name: upload-files
  persistentVolumeClaim:
    claimName: insideinfo-api-dev-upload-pvc
volumeMounts:
- name: secret-config
  mountPath: /app/config
- name: upload-files
  mountPath: /app/upload/file
persistence:
  enabled: true
  hostPath: /home/insideHomepage/upload/dev/file
  storageSize: 10Gi
  pvName: insideinfo-api-dev-upload-pv
  pvcName: insideinfo-api-dev-upload-pvc
  nodeNames:
  - hompage-prod # 실제 노드 hostname 으로 변경 필요
nodeSelector: {}
tolerations: []
affinity: {}
configmap:
  data:
    properties:
      SPRING_PROFILES_ACTIVE: "prod"
      TZ: "Asia/Seoul"
