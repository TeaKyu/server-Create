apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: insideinfo-api-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.insideinfo.co.kr/ax-2/insideinfo-gitops.git
    targetRevision: dev
    path: apps/insideinfo-api/helm
    helm:
      valueFiles:
        - values/dev/inside-api-values.yaml
        - secrets://values/dev/secret-values.enc.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: insideinfo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
